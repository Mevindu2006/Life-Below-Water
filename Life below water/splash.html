<!DOCTYPE html>

    <meta http-equiv="refresh" content="; url=home.html">
    <title>Splash Screen - Life Below Water</title><!-- Page title shown in browser tab -->

<body>

    <main>
        <div class="splash-container"> <!-- Main splash screen container with centered content -->
